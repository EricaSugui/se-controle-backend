      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MetaInput"
      responses:
        "201":
          description: Meta criada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meta"
        "400":
          $ref: "#/components/responses/ErroValidacao"

  /metas/{id}:
    get:
      tags: [Metas]
      summary: Busca uma meta pelo id
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Meta encontrada
          content:
            application/json:
