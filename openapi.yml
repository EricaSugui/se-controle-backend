                $ref: "#/components/schemas/Meta"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
    put:
      tags: [Metas]
      summary: Atualiza uma meta
      parameters:
        - $ref: "#/components/parameters/Id"
