    MetaInput:
      type: object
      required: [objetivo]
      description: >
        pessoa_id e casa_id são mutuamente exclusivos — informe exatamente um
        dos dois na criação (não são alteráveis depois). Meta pessoal
        (pessoa_id) só pode ser criada para o próprio usuário autenticado;
        meta de casa (casa_id) exige que o usuário seja admin daquela casa.
      properties:
        objetivo:
          type: string
          example: Entrada Apartamento
        valor_atual:
          type: number
          format: float
          example: 0
        meta:
          type: number
          format: float
          nullable: true
          example: 50000
        falta:
          type: number
          format: float
          nullable: true
          example: 50000
        pessoa_id:
          type: integer
          nullable: true
          description: Preencher para meta pessoal. Mutuamente exclusivo com casa_id.
          example: 7
        casa_id:
          type: integer
          nullable: true
          description: Preencher para meta de casa. Mutuamente exclusivo com pessoa_id.
          example: null

    Meta:
      allOf:
        - $ref: "#/components/schemas/MetaInput"
