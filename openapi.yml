openapi: 3.0.3
info:
  title: SeControle - Controle Financeiro Familiar API
  description: API para gerenciar transações, receitas, metas e cadastros de apoio do controle financeiro familiar.
  version: "3.1.0"

servers:
  - url: http://localhost:3000
    description: Ambiente local

tags:
  - name: Saúde
  - name: Autenticação
  - name: Pessoas
  - name: Casas
  - name: Casa Pessoas
  - name: Categorias
  - name: Formas de Pagamento
  - name: Origens de Receita
  - name: Cartões e Contas
  - name: Compras
  - name: Compra Pagadores
  - name: Faturas
  - name: Receitas
  - name: Metas
  - name: Percentual de Custeio
  - name: Convites
  - name: Dashboard
  - name: Fechamento Mensal

paths:
  # -------------------------------------------------------------------
  # Saúde
  # -------------------------------------------------------------------
  /health:
    get:
      tags: [Saúde]
      summary: Verifica se a API está no ar
      responses:
        "200":
          description: API funcionando
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  # -------------------------------------------------------------------
  # Autenticação
  # -------------------------------------------------------------------
  /auth/me:
    get:
      tags: [Autenticação]
      summary: Retorna a pessoa vinculada ao token atual
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dados da pessoa autenticada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pessoa"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/NaoVinculado"

  /auth/vincular:
    post:
      tags: [Autenticação]
      summary: Vincula o usuário Supabase a uma pessoa existente
      description: >
        Chamado uma única vez no primeiro acesso. Associa o supabase_user_id
        (extraído do Bearer token) à pessoa informada. Falha se o usuário ou a
        pessoa já estiver vinculado.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pessoa_id]
              properties:
                pessoa_id:
                  type: integer
                  example: 7
      responses:
        "200":
          description: Pessoa atualizada com supabase_user_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pessoa"
        "400":
          $ref: "#/components/responses/ErroValidacao"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
        "409":
          description: Usuário ou pessoa já vinculados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"

  # -------------------------------------------------------------------
  # Pessoas
  # -------------------------------------------------------------------
  /pessoas:
    get:
      tags: [Pessoas]
      summary: Lista pessoas que compartilham alguma casa com o usuário autenticado
      description: Idêntico a /pessoas/relacionadas — mantido por retrocompatibilidade.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AtivoFiltro"
      responses:
        "200":
          description: Lista de pessoas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pessoa"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
    post:
      tags: [Pessoas]
      summary: Cria uma pessoa
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PessoaInput"
      responses:
        "201":
          description: Pessoa criada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pessoa"
        "400":
          $ref: "#/components/responses/ErroValidacao"
        "401":
          $ref: "#/components/responses/NaoAutenticado"

  /pessoas/relacionadas:
    get:
      tags: [Pessoas]
      summary: Lista pessoas que compartilham alguma casa com o usuário autenticado
      description: >
        Retorna as pessoas que são membros de pelo menos uma casa da qual o
        usuário autenticado também é membro (sem duplicatas). Usado, por
        exemplo, para escolher o titular de um cartão/conta sem expor pessoas
        de casas às quais o usuário não pertence.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AtivoFiltro"
      responses:
        "200":
          description: Lista de pessoas relacionadas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pessoa"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/NaoVinculado"

  /pessoas/{id}:
    get:
      tags: [Pessoas]
      summary: Busca uma pessoa pelo id
      description: Retorna a pessoa se for a própria pessoa autenticada ou compartilhar alguma casa com ela.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Pessoa encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pessoa"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
    put:
      tags: [Pessoas]
      summary: Atualiza uma pessoa
      description: Requer que o usuário autenticado esteja editando os próprios dados.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PessoaInput"
      responses:
        "200":
          description: Pessoa atualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pessoa"
        "400":
          $ref: "#/components/responses/ErroValidacao"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/SemPermissao"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  # -------------------------------------------------------------------
  # Casas
  # -------------------------------------------------------------------
  /casas:
    get:
      tags: [Casas]
      summary: Lista casas
      description: Todas as casas do sistema são visíveis a qualquer usuário autenticado.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AtivoFiltro"
      responses:
        "200":
          description: Lista de casas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Casa"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
    post:
      tags: [Casas]
      summary: Cria uma casa
      description: >
        Qualquer usuário autenticado pode criar uma casa. O criador é
        automaticamente adicionado como admin da casa criada.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NomeInput"
      responses:
        "201":
          description: Casa criada (o usuário autenticado já é admin dela)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Casa"
        "400":
          $ref: "#/components/responses/ErroValidacao"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "409":
          description: Já existe uma casa com esse nome
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"

  /casas/{id}:
    put:
      tags: [Casas]
      summary: Atualiza uma casa
      description: Requer que o usuário autenticado seja admin da casa.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NomeInput"
      responses:
        "200":
          description: Casa atualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Casa"
        "400":
          $ref: "#/components/responses/ErroValidacao"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/SemPermissao"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  /casas/{id}/ativar:
    patch:
      tags: [Casas]
      summary: Ativa uma casa
      description: Requer que o usuário autenticado seja admin da casa.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Casa ativada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Casa"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/SemPermissao"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  /casas/{id}/desativar:
    patch:
      tags: [Casas]
      summary: Desativa uma casa
      description: Requer que o usuário autenticado seja admin da casa.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Casa desativada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Casa"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/SemPermissao"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  # -------------------------------------------------------------------
  # Casa Pessoas
  # -------------------------------------------------------------------
  /casas/{casaId}/pessoas:
    get:
      tags: [Casa Pessoas]
      summary: Lista membros de uma casa
      description: Requer que o usuário autenticado participe desta casa.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CasaId"
      responses:
        "200":
          description: Lista de membros com dados da pessoa
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CasaPessoa"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/SemPermissao"
    post:
      tags: [Casa Pessoas]
      summary: Associa uma pessoa a uma casa
      description: Requer que o usuário autenticado seja admin desta casa.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CasaId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CasaPessoaInput"
      responses:
        "201":
          description: Pessoa associada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CasaPessoa"
        "400":
          $ref: "#/components/responses/ErroValidacao"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/SemPermissao"
        "409":
          description: Pessoa já associada a esta casa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"

  /casas/{casaId}/pessoas/{pessoaId}/papel:
    patch:
      tags: [Casa Pessoas]
      summary: Atualiza o papel de uma pessoa na casa
      description: Requer que o usuário autenticado seja admin desta casa.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CasaId"
        - $ref: "#/components/parameters/PessoaId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [papel]
              properties:
                papel:
                  type: string
                  enum: [admin, membro]
                  example: admin
      responses:
        "200":
          description: Papel atualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CasaPessoa"
        "400":
          $ref: "#/components/responses/ErroValidacao"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/SemPermissao"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  /casas/{casaId}/pessoas/{pessoaId}:
    delete:
      tags: [Casa Pessoas]
      summary: Remove a associação de uma pessoa a uma casa
      description: Requer que o usuário autenticado seja admin desta casa.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CasaId"
        - $ref: "#/components/parameters/PessoaId"
      responses:
        "204":
          description: Associação removida
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/SemPermissao"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  # -------------------------------------------------------------------
  # Percentual de Custeio
  # -------------------------------------------------------------------
  /casas/{casaId}/percentual-custeio:
    get:
      tags: [Percentual de Custeio]
      summary: Consulta percentuais de custeio de uma casa
      description: >
        Retorna os registros de percentual de custeio da casa.
        Filtrável por competencia e/ou pessoa_id.
        Quando ambos são informados, retorna o registro exato daquela combinação (ou array vazio).
        Requer que o usuário autenticado participe desta casa.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CasaId"
        - $ref: "#/components/parameters/CompetenciaFiltro"
        - name: pessoa_id
          in: query
          required: false
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: Lista de percentuais de custeio
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PercentualCusteio"
    post:
      tags: [Percentual de Custeio]
      summary: Define o percentual de custeio de uma pessoa em uma casa para uma competência
      description: >
        Faz upsert: se já existe um registro para a combinação (casa, pessoa, competência),
        atualiza o percentual. Caso contrário, cria um novo. Requer que o usuário
        autenticado seja admin desta casa.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CasaId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PercentualCusteioInput"
      responses:
        "201":
          description: Percentual registrado ou atualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PercentualCusteio"
        "400":
          $ref: "#/components/responses/ErroValidacao"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/SemPermissao"

  # -------------------------------------------------------------------
  # Categorias
  # -------------------------------------------------------------------
  /categorias:
    get:
      tags: [Categorias]
      summary: Lista categorias
      description: >
        Leitura aberta a qualquer usuário autenticado. Escrita restrita a
        admins do sistema (pessoas com admin_sistema = true).
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AtivoFiltro"
      responses:
        "200":
          description: Lista de categorias
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Categoria"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
    post:
      tags: [Categorias]
      summary: Cria uma categoria
      description: Requer que o usuário autenticado seja admin do sistema.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NomeInput"
      responses:
        "201":
          description: Categoria criada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Categoria"
        "400":
          $ref: "#/components/responses/ErroValidacao"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/SemPermissao"
        "409":
          description: Já existe um registro com esse nome
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"

  /categorias/{id}:
    put:
      tags: [Categorias]
      summary: Atualiza o nome de uma categoria
      description: Requer que o usuário autenticado seja admin do sistema.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NomeInput"
      responses:
        "200":
          description: Categoria atualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Categoria"
        "400":
          $ref: "#/components/responses/ErroValidacao"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/SemPermissao"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
        "409":
          description: Já existe um registro com esse nome
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"

  /categorias/{id}/ativar:
    patch:
      tags: [Categorias]
      summary: Ativa uma categoria
      description: Requer que o usuário autenticado seja admin do sistema.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Categoria ativada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Categoria"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/SemPermissao"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  /categorias/{id}/desativar:
    patch:
      tags: [Categorias]
      summary: Desativa uma categoria
      description: Requer que o usuário autenticado seja admin do sistema.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Categoria desativada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Categoria"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/SemPermissao"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  # -------------------------------------------------------------------
  # Formas de Pagamento
  # -------------------------------------------------------------------
  /formas-pagamento:
    get:
      tags: [Formas de Pagamento]
      summary: Lista formas de pagamento
      description: >
        Leitura aberta a qualquer usuário autenticado. Escrita restrita a
        admins do sistema (pessoas com admin_sistema = true).
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AtivoFiltro"
      responses:
        "200":
          description: Lista de formas de pagamento
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FormaPagamento"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
    post:
      tags: [Formas de Pagamento]
      summary: Cria uma forma de pagamento
      description: Requer que o usuário autenticado seja admin do sistema.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NomeInput"
      responses:
        "201":
          description: Forma de pagamento criada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormaPagamento"
        "400":
          $ref: "#/components/responses/ErroValidacao"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/SemPermissao"
        "409":
          description: Já existe um registro com esse nome
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"

  /formas-pagamento/{id}:
    put:
      tags: [Formas de Pagamento]
      summary: Atualiza o nome de uma forma de pagamento
      description: Requer que o usuário autenticado seja admin do sistema.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NomeInput"
      responses:
        "200":
          description: Forma de pagamento atualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormaPagamento"
        "400":
          $ref: "#/components/responses/ErroValidacao"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/SemPermissao"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
        "409":
          description: Já existe um registro com esse nome
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"

  /formas-pagamento/{id}/ativar:
    patch:
      tags: [Formas de Pagamento]
      summary: Ativa uma forma de pagamento
      description: Requer que o usuário autenticado seja admin do sistema.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Forma de pagamento ativada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormaPagamento"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/SemPermissao"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  /formas-pagamento/{id}/desativar:
    patch:
      tags: [Formas de Pagamento]
      summary: Desativa uma forma de pagamento
      description: Requer que o usuário autenticado seja admin do sistema.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Forma de pagamento desativada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormaPagamento"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/SemPermissao"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  # -------------------------------------------------------------------
  # Origens de Receita
  # -------------------------------------------------------------------
  /origens-receita:
    get:
      tags: [Origens de Receita]
      summary: Lista origens de receita
      description: >
        Leitura aberta a qualquer usuário autenticado. Escrita restrita a
        admins do sistema (pessoas com admin_sistema = true).
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AtivoFiltro"
      responses:
        "200":
          description: Lista de origens de receita
          content:
            application/json:
              schema:
                type: array
                items:
