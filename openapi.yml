openapi: 3.0.3
info:
  title: SeControle - Controle Financeiro Familiar API
  description: API para gerenciar transações, receitas, metas e cadastros de apoio do controle financeiro familiar.
  version: "3.0.0"

servers:
  - url: http://localhost:3000
    description: Ambiente local

tags:
  - name: Saúde
  - name: Autenticação
  - name: Pessoas
  - name: Casas
  - name: Casa Pessoas
  - name: Categorias
  - name: Formas de Pagamento
  - name: Origens de Receita
  - name: Cartões e Contas
  - name: Transações
  - name: Transação Pagadores
  - name: Receitas
  - name: Metas
  - name: Percentual de Custeio
  - name: Convites
  - name: Dashboard
  - name: Fechamento Mensal

paths:
  # -------------------------------------------------------------------
  # Saúde
  # -------------------------------------------------------------------
  /health:
    get:
      tags: [Saúde]
      summary: Verifica se a API está no ar
      responses:
        "200":
          description: API funcionando
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  # -------------------------------------------------------------------
  # Autenticação
  # -------------------------------------------------------------------
  /auth/me:
    get:
      tags: [Autenticação]
      summary: Retorna a pessoa vinculada ao token atual
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dados da pessoa autenticada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pessoa"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/NaoVinculado"

  /auth/vincular:
    post:
      tags: [Autenticação]
      summary: Vincula o usuário Supabase a uma pessoa existente
      description: >
        Chamado uma única vez no primeiro acesso. Associa o supabase_user_id
        (extraído do Bearer token) à pessoa informada. Falha se o usuário ou a
        pessoa já estiver vinculado.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pessoa_id]
              properties:
                pessoa_id:
                  type: integer
                  example: 7
      responses:
        "200":
          description: Pessoa atualizada com supabase_user_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pessoa"
        "400":
          $ref: "#/components/responses/ErroValidacao"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
        "409":
          description: Usuário ou pessoa já vinculados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"

  # -------------------------------------------------------------------
  # Pessoas
  # -------------------------------------------------------------------
  /pessoas:
    get:
      tags: [Pessoas]
      summary: Lista pessoas
      parameters:
        - $ref: "#/components/parameters/AtivoFiltro"
      responses:
        "200":
          description: Lista de pessoas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pessoa"
    post:
      tags: [Pessoas]
      summary: Cria uma pessoa
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PessoaInput"
      responses:
        "201":
          description: Pessoa criada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pessoa"
        "400":
          $ref: "#/components/responses/ErroValidacao"

  /pessoas/{id}:
    get:
      tags: [Pessoas]
      summary: Busca uma pessoa pelo id
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Pessoa encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pessoa"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
    put:
      tags: [Pessoas]
      summary: Atualiza uma pessoa
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PessoaInput"
      responses:
        "200":
          description: Pessoa atualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pessoa"
        "400":
          $ref: "#/components/responses/ErroValidacao"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  /pessoas/{id}/ativar:
    patch:
      tags: [Pessoas]
      summary: Ativa uma pessoa
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Pessoa ativada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pessoa"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  /pessoas/{id}/desativar:
    patch:
      tags: [Pessoas]
      summary: Desativa uma pessoa
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Pessoa desativada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pessoa"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  # -------------------------------------------------------------------
  # Casas
  # -------------------------------------------------------------------
  /casas:
    get:
      tags: [Casas]
      summary: Lista casas
      parameters:
        - $ref: "#/components/parameters/AtivoFiltro"
      responses:
        "200":
          description: Lista de casas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Casa"
    post:
      tags: [Casas]
      summary: Cria uma casa
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NomeInput"
      responses:
        "201":
          description: Casa criada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Casa"
        "400":
          $ref: "#/components/responses/ErroValidacao"

  /casas/{id}:
    put:
      tags: [Casas]
      summary: Atualiza uma casa
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NomeInput"
      responses:
        "200":
          description: Casa atualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Casa"
        "400":
          $ref: "#/components/responses/ErroValidacao"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  /casas/{id}/ativar:
    patch:
      tags: [Casas]
      summary: Ativa uma casa
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Casa ativada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Casa"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  /casas/{id}/desativar:
    patch:
      tags: [Casas]
      summary: Desativa uma casa
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Casa desativada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Casa"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  # -------------------------------------------------------------------
  # Casa Pessoas
  # -------------------------------------------------------------------
  /casas/{casaId}/pessoas:
    get:
      tags: [Casa Pessoas]
      summary: Lista membros de uma casa
      parameters:
        - $ref: "#/components/parameters/CasaId"
      responses:
        "200":
          description: Lista de membros com dados da pessoa
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CasaPessoa"
    post:
      tags: [Casa Pessoas]
      summary: Associa uma pessoa a uma casa
      parameters:
        - $ref: "#/components/parameters/CasaId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CasaPessoaInput"
      responses:
        "201":
          description: Pessoa associada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CasaPessoa"
        "400":
          $ref: "#/components/responses/ErroValidacao"
        "409":
          description: Pessoa já associada a esta casa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"

  /casas/{casaId}/pessoas/{pessoaId}/papel:
    patch:
      tags: [Casa Pessoas]
      summary: Atualiza o papel de uma pessoa na casa
      parameters:
        - $ref: "#/components/parameters/CasaId"
        - $ref: "#/components/parameters/PessoaId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [papel]
              properties:
                papel:
                  type: string
                  enum: [admin, membro]
                  example: admin
      responses:
        "200":
          description: Papel atualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CasaPessoa"
        "400":
          $ref: "#/components/responses/ErroValidacao"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  /casas/{casaId}/pessoas/{pessoaId}:
    delete:
      tags: [Casa Pessoas]
      summary: Remove a associação de uma pessoa a uma casa
      parameters:
        - $ref: "#/components/parameters/CasaId"
        - $ref: "#/components/parameters/PessoaId"
      responses:
        "204":
          description: Associação removida
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  # -------------------------------------------------------------------
  # Percentual de Custeio
  # -------------------------------------------------------------------
  /casas/{casaId}/percentual-custeio:
    get:
      tags: [Percentual de Custeio]
      summary: Consulta percentuais de custeio de uma casa
      description: >
        Retorna os registros de percentual de custeio da casa.
        Filtrável por competencia e/ou pessoa_id.
        Quando ambos são informados, retorna o registro exato daquela combinação (ou array vazio).
      parameters:
        - $ref: "#/components/parameters/CasaId"
        - $ref: "#/components/parameters/CompetenciaFiltro"
        - name: pessoa_id
          in: query
          required: false
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: Lista de percentuais de custeio
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PercentualCusteio"
    post:
      tags: [Percentual de Custeio]
      summary: Define o percentual de custeio de uma pessoa em uma casa para uma competência
      description: >
        Faz upsert: se já existe um registro para a combinação (casa, pessoa, competência),
        atualiza o percentual. Caso contrário, cria um novo.
      parameters:
        - $ref: "#/components/parameters/CasaId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PercentualCusteioInput"
      responses:
        "201":
          description: Percentual registrado ou atualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PercentualCusteio"
        "400":
          $ref: "#/components/responses/ErroValidacao"

  # -------------------------------------------------------------------
  # Categorias
  # -------------------------------------------------------------------
  /categorias:
    get:
      tags: [Categorias]
      summary: Lista categorias
      parameters:
        - $ref: "#/components/parameters/AtivoFiltro"
      responses:
        "200":
          description: Lista de categorias
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Categoria"
    post:
      tags: [Categorias]
      summary: Cria uma categoria
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NomeInput"
      responses:
        "201":
          description: Categoria criada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Categoria"
        "400":
          $ref: "#/components/responses/ErroValidacao"

  /categorias/{id}:
    put:
      tags: [Categorias]
      summary: Atualiza uma categoria
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NomeInput"
      responses:
        "200":
          description: Categoria atualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Categoria"
        "400":
          $ref: "#/components/responses/ErroValidacao"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  /categorias/{id}/ativar:
    patch:
      tags: [Categorias]
      summary: Ativa uma categoria
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Categoria ativada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Categoria"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  /categorias/{id}/desativar:
    patch:
      tags: [Categorias]
      summary: Desativa uma categoria
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Categoria desativada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Categoria"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  # -------------------------------------------------------------------
  # Formas de Pagamento
  # -------------------------------------------------------------------
  /formas-pagamento:
    get:
      tags: [Formas de Pagamento]
      summary: Lista formas de pagamento
      parameters:
        - $ref: "#/components/parameters/AtivoFiltro"
      responses:
        "200":
          description: Lista de formas de pagamento
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FormaPagamento"
    post:
      tags: [Formas de Pagamento]
      summary: Cria uma forma de pagamento
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NomeInput"
      responses:
        "201":
          description: Forma de pagamento criada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormaPagamento"
        "400":
          $ref: "#/components/responses/ErroValidacao"

  /formas-pagamento/{id}:
    put:
      tags: [Formas de Pagamento]
      summary: Atualiza uma forma de pagamento
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NomeInput"
      responses:
        "200":
          description: Forma de pagamento atualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormaPagamento"
        "400":
          $ref: "#/components/responses/ErroValidacao"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  /formas-pagamento/{id}/ativar:
    patch:
      tags: [Formas de Pagamento]
      summary: Ativa uma forma de pagamento
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Forma de pagamento ativada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormaPagamento"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  /formas-pagamento/{id}/desativar:
    patch:
      tags: [Formas de Pagamento]
      summary: Desativa uma forma de pagamento
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Forma de pagamento desativada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormaPagamento"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  # -------------------------------------------------------------------
  # Origens de Receita
  # -------------------------------------------------------------------
  /origens-receita:
    get:
      tags: [Origens de Receita]
      summary: Lista origens de receita
      parameters:
        - $ref: "#/components/parameters/AtivoFiltro"
      responses:
        "200":
          description: Lista de origens de receita
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrigemReceita"
    post:
      tags: [Origens de Receita]
      summary: Cria uma origem de receita
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NomeInput"
      responses:
        "201":
          description: Origem criada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrigemReceita"
        "400":
          $ref: "#/components/responses/ErroValidacao"

  /origens-receita/{id}:
    put:
      tags: [Origens de Receita]
      summary: Atualiza uma origem de receita
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NomeInput"
      responses:
        "200":
          description: Origem atualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrigemReceita"
        "400":
          $ref: "#/components/responses/ErroValidacao"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  /origens-receita/{id}/ativar:
    patch:
      tags: [Origens de Receita]
      summary: Ativa uma origem de receita
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Origem ativada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrigemReceita"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  /origens-receita/{id}/desativar:
    patch:
      tags: [Origens de Receita]
      summary: Desativa uma origem de receita
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Origem desativada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrigemReceita"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  # -------------------------------------------------------------------
  # Cartões e Contas
  # -------------------------------------------------------------------
  /cartoes-contas:
    get:
      tags: [Cartões e Contas]
      summary: Lista cartões e contas
      parameters:
        - $ref: "#/components/parameters/AtivoFiltro"
      responses:
        "200":
          description: Lista de cartões e contas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CartaoConta"
    post:
      tags: [Cartões e Contas]
      summary: Cria um cartão ou conta
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartaoContaInput"
      responses:
        "201":
          description: Cartão/conta criado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartaoConta"
        "400":
          $ref: "#/components/responses/ErroValidacao"

  /cartoes-contas/{id}:
    put:
      tags: [Cartões e Contas]
      summary: Atualiza um cartão ou conta
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartaoContaInput"
      responses:
        "200":
          description: Cartão/conta atualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartaoConta"
        "400":
          $ref: "#/components/responses/ErroValidacao"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  /cartoes-contas/{id}/ativar:
    patch:
      tags: [Cartões e Contas]
      summary: Ativa um cartão ou conta
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Cartão/conta ativado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartaoConta"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  /cartoes-contas/{id}/desativar:
    patch:
      tags: [Cartões e Contas]
      summary: Desativa um cartão ou conta
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Cartão/conta desativado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartaoConta"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  # -------------------------------------------------------------------
  # Transações
  # -------------------------------------------------------------------
  /transacoes:
    get:
      tags: [Transações]
      summary: Lista transações
      parameters:
        - $ref: "#/components/parameters/CompetenciaFiltro"
      responses:
        "200":
          description: Lista de transações
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transacao"
    post:
      tags: [Transações]
      summary: Cria uma transação
      description: >
        Se forma_pagamento for "crédito parcelado" e total_parcelas > 1,
        cria automaticamente uma transação por parcela nos meses seguintes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransacaoInput"
      responses:
        "201":
          description: Transação criada (retorna a primeira parcela quando parcelado)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transacao"
        "400":
          $ref: "#/components/responses/ErroValidacao"

  /transacoes/{id}:
    get:
      tags: [Transações]
      summary: Busca uma transação pelo id
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Transação encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transacao"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
    put:
      tags: [Transações]
      summary: Atualiza uma transação
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransacaoInput"
      responses:
        "200":
          description: Transação atualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transacao"
        "400":
          $ref: "#/components/responses/ErroValidacao"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
    delete:
      tags: [Transações]
      summary: Remove uma transação
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "204":
          description: Transação removida
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  # -------------------------------------------------------------------
  # Transação Pagadores
  # -------------------------------------------------------------------
  /transacoes/{transacaoId}/pagadores:
    get:
      tags: [Transação Pagadores]
      summary: Lista pagadores de uma transação
      parameters:
        - $ref: "#/components/parameters/TransacaoId"
      responses:
        "200":
          description: Lista de pagadores com nome da pessoa
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TransacaoPagador"
    post:
      tags: [Transação Pagadores]
      summary: Adiciona um pagador a uma transação
      parameters:
        - $ref: "#/components/parameters/TransacaoId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransacaoPagadorInput"
      responses:
        "201":
          description: Pagador adicionado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransacaoPagador"
        "400":
          $ref: "#/components/responses/ErroValidacao"
        "404":
          description: Transação ou pessoa não encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
        "409":
          description: Pessoa já registrada como pagadora desta transação
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"

  /transacoes/{transacaoId}/pagadores/{pessoaId}:
    patch:
      tags: [Transação Pagadores]
      summary: Atualiza o percentual de um pagador
      parameters:
        - $ref: "#/components/parameters/TransacaoId"
        - $ref: "#/components/parameters/PessoaId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                percentual:
                  type: number
                  format: float
                  nullable: true
                  example: 60
      responses:
        "200":
          description: Percentual atualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransacaoPagador"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
    delete:
      tags: [Transação Pagadores]
      summary: Remove um pagador de uma transação
      parameters:
        - $ref: "#/components/parameters/TransacaoId"
        - $ref: "#/components/parameters/PessoaId"
      responses:
        "204":
          description: Pagador removido
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  # -------------------------------------------------------------------
