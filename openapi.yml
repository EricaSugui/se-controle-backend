  # -------------------------------------------------------------------
  # Cartões e Contas
  # -------------------------------------------------------------------
  /cartoes-contas:
    get:
      tags: [Cartões e Contas]
      summary: Lista cartões e contas
      description: >
        Retorna os cartões/contas do próprio usuário autenticado (titular),
        mais os de outras pessoas que tenham sido explicitamente
        compartilhados (`compartilhado = true` em
        /cartoes-contas/{cartaoId}/visibilidade) com alguma casa da qual o
        usuário participa. Privado por padrão — compartilhar uma casa com o
        titular não é suficiente por si só. Cada item inclui `pode_editar`,
        verdadeiro somente quando o usuário autenticado é o titular.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AtivoFiltro"
      responses:
        "200":
          description: Lista de cartões e contas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CartaoConta"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/NaoVinculado"
    post:
      tags: [Cartões e Contas]
      summary: Cria um cartão ou conta
      description: >
        `titular_id`, se informado e diferente do próprio usuário autenticado,
        exige que o usuário seja admin em alguma casa compartilhada com a
        pessoa indicada.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartaoContaInput"
      responses:
        "201":
          description: Cartão/conta criado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartaoConta"
        "400":
          $ref: "#/components/responses/ErroValidacao"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/SemPermissao"

  /cartoes-contas/{id}:
    put:
      tags: [Cartões e Contas]
      summary: Atualiza um cartão ou conta
      description: Requer que o usuário autenticado seja o titular do registro.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartaoContaInput"
      responses:
        "200":
          description: Cartão/conta atualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartaoConta"
        "400":
          $ref: "#/components/responses/ErroValidacao"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/SemPermissao"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  /cartoes-contas/{id}/ativar:
    patch:
      tags: [Cartões e Contas]
      summary: Ativa um cartão ou conta
      description: Requer que o usuário autenticado seja o titular do registro.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Cartão/conta ativado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartaoConta"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/SemPermissao"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  /cartoes-contas/{id}/desativar:
    patch:
      tags: [Cartões e Contas]
      summary: Desativa um cartão ou conta
      description: Requer que o usuário autenticado seja o titular do registro.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Cartão/conta desativado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartaoConta"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/SemPermissao"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  # -------------------------------------------------------------------
  # Cartão Casa Visibilidade
  # -------------------------------------------------------------------
  /cartoes-contas/{cartaoId}/visibilidade:
    get:
      tags: [Cartões e Contas]
      summary: Lista o compartilhamento de um cartão/conta com casas
      description: >
        O titular vê todas as entradas de visibilidade do cartão. Um membro de
        casa que não é o titular só vê a entrada referente à própria casa.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CartaoId"
      responses:
        "200":
          description: Lista de entradas de visibilidade
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CartaoCasaVisibilidade"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
    post:
      tags: [Cartões e Contas]
      summary: Define o compartilhamento de um cartão/conta com uma casa
      description: Requer que o usuário autenticado seja o titular do cartão.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CartaoId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartaoCasaVisibilidadeInput"
      responses:
        "201":
          description: Entrada de visibilidade criada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartaoCasaVisibilidade"
        "400":
          $ref: "#/components/responses/ErroValidacao"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/SemPermissao"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
        "409":
          description: Já existe uma entrada de visibilidade para esta casa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"

  /cartoes-contas/{cartaoId}/visibilidade/{casaId}:
    patch:
      tags: [Cartões e Contas]
      summary: Alterna o compartilhamento de um cartão/conta com uma casa
      description: Requer que o usuário autenticado seja o titular do cartão.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CartaoId"
        - $ref: "#/components/parameters/CasaId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [compartilhado]
              properties:
                compartilhado:
                  type: boolean
                  example: true
      responses:
        "200":
          description: Entrada de visibilidade atualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartaoCasaVisibilidade"
        "400":
          $ref: "#/components/responses/ErroValidacao"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/SemPermissao"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
    delete:
      tags: [Cartões e Contas]
      summary: Remove o compartilhamento de um cartão/conta com uma casa
      description: >
        Requer que o usuário autenticado seja o titular do cartão. Remover a
        entrada volta o cartão ao padrão privado para aquela casa.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CartaoId"
        - $ref: "#/components/parameters/CasaId"
      responses:
        "204":
          description: Entrada de visibilidade removida
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/SemPermissao"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  # -------------------------------------------------------------------
  # Compras
  # -------------------------------------------------------------------
  /compras:
    get:
      tags: [Compras]
      summary: Lista compras
      description: >
        Retorna apenas compras de casas das quais o usuário autenticado é
        membro. Cada item inclui `pode_editar`, verdadeiro se o usuário
        autenticado registrou a compra (`lancado_por_id`) ou é admin na casa
        dela.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CompetenciaFiltro"
        - $ref: "#/components/parameters/DataCaixaDe"
        - $ref: "#/components/parameters/DataCaixaAte"
      responses:
        "200":
          description: Lista de compras
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Compra"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
    post:
      tags: [Compras]
      summary: Cria uma compra
      description: >
        `lancado_por_id` é sempre definido como o usuário autenticado,
        ignorando qualquer valor enviado no corpo. Requer que o usuário seja
        membro da casa informada em `casa_id`. Cria automaticamente
        `total_parcelas` parcelas: se `cartao_conta_id` referenciar um cartão
        de crédito, cada parcela é atribuída a uma fatura (criada sob demanda
        conforme o dia de fechamento/vencimento do cartão); senão, cada
        parcela usa `data_propria` (data da compra + N meses).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompraInput"
      responses:
        "201":
          description: Compra criada, com as parcelas geradas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Compra"
        "400":
          $ref: "#/components/responses/ErroValidacao"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/SemPermissao"

  /compras/{id}:
    get:
      tags: [Compras]
      summary: Busca uma compra pelo id
      description: Requer que o usuário autenticado seja membro da casa da compra.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Compra encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Compra"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
    put:
      tags: [Compras]
      summary: Atualiza uma compra
      description: >
        Requer que o usuário autenticado tenha registrado a compra
        (`lancado_por_id`) ou seja admin na casa dela. `lancado_por_id` não é
        alterável. Apaga e recria todas as parcelas da compra.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompraInput"
      responses:
        "200":
          description: Compra atualizada, com as parcelas recriadas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Compra"
        "400":
          $ref: "#/components/responses/ErroValidacao"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/SemPermissao"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
    delete:
      tags: [Compras]
      summary: Remove uma compra
      description: >
        Requer que o usuário autenticado tenha registrado a compra
        (`lancado_por_id`) ou seja admin na casa dela. Remove em cascata as
        parcelas e o split de pagadores.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "204":
          description: Compra removida
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/SemPermissao"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  /compras/{id}/parcelas:
    get:
      tags: [Compras]
      summary: Lista as parcelas de uma compra
      description: >
        Somente leitura — parcelas são geradas automaticamente na criação/edição
        da compra. Cada parcela inclui `data_caixa`, a data efetiva em que o
        valor sai do caixa (vencimento da fatura, quando há cartão de crédito
        envolvido, ou `data_propria` caso contrário).
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Lista de parcelas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Parcela"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  # -------------------------------------------------------------------
  # Compra Pagadores
  # -------------------------------------------------------------------
  /compras/{compraId}/pagadores:
    get:
      tags: [Compra Pagadores]
      summary: Lista pagadores de uma compra
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CompraId"
      responses:
        "200":
          description: Lista de pagadores com nome da pessoa
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CompraPagador"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
    post:
      tags: [Compra Pagadores]
      summary: Adiciona um pagador a uma compra
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CompraId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompraPagadorInput"
      responses:
        "201":
          description: Pagador adicionado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompraPagador"
        "400":
          $ref: "#/components/responses/ErroValidacao"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "404":
          description: Compra ou pessoa não encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
        "409":
          description: Pessoa já registrada como pagadora desta compra
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"

  /compras/{compraId}/pagadores/{pessoaId}:
    patch:
      tags: [Compra Pagadores]
      summary: Atualiza o percentual de um pagador
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CompraId"
        - $ref: "#/components/parameters/PessoaId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                percentual:
                  type: number
                  format: float
                  nullable: true
                  example: 60
      responses:
        "200":
          description: Percentual atualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompraPagador"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
    delete:
      tags: [Compra Pagadores]
      summary: Remove um pagador de uma compra
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CompraId"
        - $ref: "#/components/parameters/PessoaId"
      responses:
        "204":
          description: Pagador removido
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  # -------------------------------------------------------------------
  # Faturas
  # -------------------------------------------------------------------
  /faturas:
    get:
      tags: [Faturas]
      summary: Lista faturas
      description: >
        Retorna apenas faturas de cartões dos quais o usuário autenticado é o
        titular — não há visibilidade compartilhada por casa, mesmo que o
        cartão esteja compartilhado.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CartaoContaIdFiltro"
      responses:
        "200":
          description: Lista de faturas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Fatura"
        "401":
          $ref: "#/components/responses/NaoAutenticado"

  /faturas/{id}:
    get:
      tags: [Faturas]
      summary: Busca uma fatura pelo id, com suas parcelas
      description: Requer que o usuário autenticado seja o titular do cartão da fatura.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Fatura encontrada, com as parcelas embutidas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fatura"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/SemPermissao"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
    put:
      tags: [Faturas]
      summary: Ajusta as datas de uma fatura
      description: >
        Requer que o usuário autenticado seja o titular do cartão da fatura.
        Não existe criação manual de fatura — ela nasce automaticamente quando
        a primeira compra do ciclo é lançada. Use este endpoint para corrigir
        `data_fechamento`/`data_vencimento` quando a realidade diverge da
        regra (ex.: fechamento caiu em fim de semana e deslizou).
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FaturaInput"
      responses:
        "200":
          description: Fatura atualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fatura"
        "400":
          $ref: "#/components/responses/ErroValidacao"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/SemPermissao"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  # -------------------------------------------------------------------
  # Receitas
  # -------------------------------------------------------------------
  /receitas:
    get:
      tags: [Receitas]
      summary: Lista receitas
      description: >
        Retorna apenas receitas de casas das quais o usuário autenticado é
        membro. Cada item inclui `pode_editar`, verdadeiro se o usuário
        autenticado registrou a receita (`lancado_por_id`) ou é admin na casa
        dela.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CompetenciaFiltro"
      responses:
        "200":
          description: Lista de receitas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Receita"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/NaoVinculado"
    post:
      tags: [Receitas]
      summary: Cria uma receita
      description: >
        `lancado_por_id` é sempre definido como o usuário autenticado,
        ignorando qualquer valor enviado no corpo. Requer que o usuário seja
        membro da casa informada em `casa_id`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReceitaInput"
      responses:
        "201":
          description: Receita criada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Receita"
        "400":
          $ref: "#/components/responses/ErroValidacao"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/SemPermissao"

  /receitas/{id}:
    get:
      tags: [Receitas]
      summary: Busca uma receita pelo id
      description: Requer que o usuário autenticado seja membro da casa da receita.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Receita encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Receita"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
    put:
      tags: [Receitas]
      summary: Atualiza uma receita
      description: >
        Requer que o usuário autenticado tenha registrado a receita
        (`lancado_por_id`) ou seja admin na casa dela. `lancado_por_id` não é
        alterável.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReceitaInput"
      responses:
        "200":
          description: Receita atualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Receita"
        "400":
          $ref: "#/components/responses/ErroValidacao"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/SemPermissao"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
    delete:
      tags: [Receitas]
      summary: Remove uma receita
      description: >
        Requer que o usuário autenticado tenha registrado a receita
        (`lancado_por_id`) ou seja admin na casa dela.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "204":
          description: Receita removida
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/SemPermissao"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  # -------------------------------------------------------------------
  # Metas
  # -------------------------------------------------------------------
  /metas:
    get:
      tags: [Metas]
      summary: Lista metas
      description: >
        Retorna metas pessoais do usuário autenticado (`pessoa_id`) e metas
        das casas das quais ele é membro (`casa_id`).
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Lista de metas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Meta"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
    post:
      tags: [Metas]
      summary: Cria uma meta
      description: >
        Exige exatamente um entre `pessoa_id` e `casa_id`. Meta pessoal só
        pode ser criada pelo próprio usuário (`pessoa_id` = usuário
        autenticado); meta de casa exige que o usuário seja admin da casa.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MetaInput"
      responses:
        "201":
          description: Meta criada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meta"
        "400":
          $ref: "#/components/responses/ErroValidacao"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/SemPermissao"

  /metas/{id}:
    get:
      tags: [Metas]
      summary: Busca uma meta pelo id
      description: >
        Requer que a meta seja pessoal do usuário autenticado, ou de casa da
        qual ele é membro.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Meta encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meta"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
    put:
      tags: [Metas]
      summary: Atualiza uma meta
      description: >
        Requer que a meta seja pessoal do usuário autenticado, ou de casa da
        qual ele é admin. `pessoa_id`/`casa_id` não são alteráveis (escopo
        fixo desde a criação).
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MetaInput"
      responses:
        "200":
          description: Meta atualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meta"
        "400":
          $ref: "#/components/responses/ErroValidacao"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/SemPermissao"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
    delete:
      tags: [Metas]
      summary: Remove uma meta
      description: >
        Requer que a meta seja pessoal do usuário autenticado, ou de casa da
        qual ele é admin.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "204":
          description: Meta removida
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/SemPermissao"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  # -------------------------------------------------------------------
  # Convites
  # -------------------------------------------------------------------
  /convites:
    get:
      tags: [Convites]
      summary: Lista convites
      description: >
        Retorna convites de casas das quais o usuário autenticado é admin, e
        convites sem casa (auto-cadastro) criados pelo próprio usuário. A
        resposta nunca inclui o campo `token`.
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pendente, aceito, expirado]
          example: pendente
        - name: email
          in: query
          required: false
          schema:
            type: string
            format: email
          example: convidado@email.com
      responses:
        "200":
          description: Lista de convites (sem o campo token)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConviteSemToken"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
    post:
      tags: [Convites]
      summary: Cria um convite e envia email pelo Supabase
      description: >
        Salva o convite no banco e aciona o Supabase para enviar um email de convite
        ao endereço informado. O link no email redireciona ao frontend com o token
        do convite na query string e o access_token do Supabase no fragmento (#).
        `convidado_por_id` é sempre o usuário autenticado, ignorando qualquer
        valor enviado no corpo. Se `casa_id` for informado, exige que o usuário
        seja admin daquela casa; convites sem `casa_id` (auto-cadastro) podem
        ser criados por qualquer autenticado.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConviteInput"
      responses:
        "201":
          description: Convite criado e email enviado (sem o campo token)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConviteSemToken"
        "400":
          $ref: "#/components/responses/ErroValidacao"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/SemPermissao"

  /convites/token/{token}:
    get:
      tags: [Convites]
      summary: Busca um convite pelo token
      parameters:
        - $ref: "#/components/parameters/ConviteToken"
      responses:
        "200":
          description: Convite encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Convite"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  /convites/token/{token}/aceitar:
    patch:
      tags: [Convites]
      summary: Aceita um convite — fluxo completo de cadastro
      description: >
        Valida o Bearer token do Supabase, confere se o email bate com o do convite,
        cria a pessoa no banco, vincula o supabase_user_id, adiciona à casa_pessoas
        (se o convite tiver casa_id) e marca o convite como aceito. Tudo em uma
        transação atômica.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ConviteToken"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                nome:
                  type: string
                  description: Nome da pessoa. Se omitido, usa o prefixo do email.
                  example: Marcela
      responses:
        "200":
          description: Convite aceito — retorna a pessoa criada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pessoa"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          description: Email do usuário não corresponde ao convite
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
        "409":
          description: Convite já utilizado, expirado ou usuário já vinculado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"

  /convites/{id}:
    get:
      tags: [Convites]
      summary: Busca um convite pelo id
      description: >
        Requer que o usuário autenticado seja admin da casa do convite, ou
        (se o convite não tiver casa) que tenha sido quem o criou.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Convite encontrado (sem o campo token)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConviteSemToken"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  /convites/{id}/aceitar:
    patch:
      tags: [Convites]
      summary: Marca um convite como aceito (uso administrativo)
      description: >
        Altera apenas o status do convite para "aceito", sem criar pessoa nem
        acionar Supabase. Use para correções manuais. Requer que o usuário
        autenticado seja admin da casa do convite, ou (se o convite não tiver
        casa) que tenha sido quem o criou.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Convite marcado como aceito (sem o campo token)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConviteSemToken"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/SemPermissao"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  /convites/{id}/expirar:
    patch:
      tags: [Convites]
      summary: Expira um convite pendente
      description: >
        Requer que o usuário autenticado seja admin da casa do convite, ou
        (se o convite não tiver casa) que tenha sido quem o criou.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Convite expirado (sem o campo token)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConviteSemToken"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          $ref: "#/components/responses/SemPermissao"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  # -------------------------------------------------------------------
  # Dashboard
  # -------------------------------------------------------------------
  /dashboard:
    get:
      tags: [Dashboard]
      summary: Resumo financeiro de uma competência
      description: >
        Retorna, para cada casa vinculada à pessoa autenticada, o total de receitas da casa,
        o total de gastos e o saldo da casa, além do percentual de custeio e a parte devida
        pela pessoa naquela competência.
      security:
        - bearerAuth: []
      parameters:
        - name: competencia
          in: query
          required: true
          description: "Competência no formato MES-AA (ex.: JUN-26)"
          schema:
            type: string
            example: JUN-26
        - name: eixo
          in: query
          required: false
          description: >
            "caixa" (padrão): soma parcelas cuja data_caixa cai na competência
            informada (vencimento da fatura, ou data_propria). "competencia":
            soma todas as parcelas de compras cuja competencia (mês em que a
            despesa foi decidida) bate com o valor informado, independente de
            quando o valor efetivamente sai do caixa.
          schema:
            type: string
            enum: [caixa, competencia]
            default: caixa
      responses:
        "200":
          description: Resumo do dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dashboard"
        "400":
          $ref: "#/components/responses/ErroValidacao"
        "401":
          $ref: "#/components/responses/NaoAutenticado"

  # -------------------------------------------------------------------
  # Fechamento Mensal
  # -------------------------------------------------------------------
  /fechamento-mensal:
    get:
      tags: [Fechamento Mensal]
      summary: Resumo financeiro de várias competências
      description: >
        Retorna um resumo (igual ao do /dashboard) para cada competência no intervalo
        informado, do mês "de" até o mês "ate", inclusive. Máximo de 60 meses.
      parameters:
        - name: de
          in: query
          required: true
          description: "Competência inicial no formato MES-AA (ex.: JAN-26)"
          schema:
            type: string
            example: JAN-26
        - name: ate
          in: query
          required: true
          description: "Competência final no formato MES-AA (ex.: DEZ-26)"
          schema:
            type: string
            example: DEZ-26
      responses:
        "200":
          description: Lista de resumos mensais, um por competência no intervalo
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Dashboard"
        "400":
          $ref: "#/components/responses/ErroValidacao"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT emitido pelo Supabase Auth após login

  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: integer
      example: 1

    CasaId:
      name: casaId
      in: path
      required: true
      schema:
        type: integer
      example: 1

    PessoaId:
      name: pessoaId
      in: path
      required: true
      schema:
        type: integer
      example: 7

    CompraId:
      name: compraId
      in: path
      required: true
      schema:
        type: integer
      example: 5

    CartaoId:
      name: cartaoId
      in: path
      required: true
      schema:
        type: integer
      example: 2

    DataCaixaDe:
      name: de
      in: query
      required: false
      description: Filtra compras com pelo menos uma parcela cuja data_caixa seja >= este valor (formato ISO, ex. 2026-06-01)
      schema:
        type: string
        format: date

    DataCaixaAte:
      name: ate
      in: query
      required: false
      description: Filtra compras com pelo menos uma parcela cuja data_caixa seja <= este valor (formato ISO, ex. 2026-06-30)
      schema:
        type: string
        format: date

    CartaoContaIdFiltro:
      name: cartao_conta_id
      in: query
      required: false
      description: Filtra faturas de um cartão específico
      schema:
        type: integer
        example: 2

    ConviteToken:
      name: token
      in: path
      required: true
      schema:
        type: string
      example: a3f8c2d1e4b7...

    AtivoFiltro:
      name: ativo
      in: query
      required: false
      description: Filtra pelo status ativo/inativo
      schema:
        type: boolean

    CompetenciaFiltro:
      name: competencia
      in: query
      required: false
      description: "Filtra pela competência no formato MES-AA (ex.: JUN-26)"
      schema:
        type: string
        example: JUN-26

  responses:
    ErroValidacao:
      description: Dados inválidos
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Erro"

    NaoEncontrado:
      description: Registro não encontrado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Erro"

    NaoAutenticado:
      description: Token não fornecido ou inválido
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Erro"

    NaoVinculado:
      description: Token válido mas usuário não vinculado a nenhuma pessoa
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Erro"

    SemPermissao:
      description: Usuário autenticado, mas sem permissão para esta ação
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Erro"

  schemas:
    Erro:
      type: object
      properties:
        erro:
          type: string
          example: Registro não encontrado

    NomeInput:
      type: object
      required: [nome]
      properties:
        nome:
          type: string
          example: Energia

    PessoaInput:
      type: object
      required: [nome]
      properties:
        nome:
          type: string
          example: Erica
        email:
          type: string
          format: email
          nullable: true
          example: erica@email.com

    Pessoa:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          example: Erica
        email:
          type: string
          format: email
          nullable: true
          example: erica@email.com
        supabase_user_id:
          type: string
          format: uuid
          nullable: true
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        ativo:
          type: boolean
          example: true
        admin_sistema:
          type: boolean
          description: >
            Papel global de admin do sistema — permite gerenciar as tabelas de
            referência (categorias, formas de pagamento, origens de receita).
            Diferente de admin de casa (casa_pessoas.papel).
          example: false
        created_at:
          type: string
          format: date-time

    Casa:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          example: Minha Casa
        ativo:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time

    CasaPessoaInput:
      type: object
      required: [pessoa_id]
      properties:
        pessoa_id:
          type: integer
          example: 7
        papel:
          type: string
          enum: [admin, membro]
          default: membro
          example: admin

    CasaPessoa:
      type: object
      properties:
        id:
          type: integer
          example: 1
        pessoa_id:
          type: integer
          example: 7
        papel:
          type: string
          enum: [admin, membro]
          example: admin
        created_at:
          type: string
          format: date-time
        nome:
          type: string
          example: Erica
        email:
          type: string
          format: email
          nullable: true
          example: erica@email.com
        ativo:
          type: boolean
          example: true

    Categoria:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          example: Energia
        ativo:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time

    FormaPagamento:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          example: Pix
        ativo:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time

    OrigemReceita:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          example: Salário
        ativo:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time

    CartaoContaInput:
      type: object
      required: [nome, tipo]
      properties:
        nome:
          type: string
          example: Nubank
        tipo:
          type: string
          enum: [credito, debito]
          example: credito
        titular_id:
          type: integer
          nullable: true
          example: 1
        limite:
          type: number
          format: float
          nullable: true
          example: 12000
        dia_fechamento:
          type: integer
          nullable: true
          example: 19
        dia_vencimento:
          type: integer
          nullable: true
          example: 25

    CartaoConta:
      allOf:
        - $ref: "#/components/schemas/CartaoContaInput"
        - type: object
          properties:
            id:
              type: integer
              example: 1
            ativo:
              type: boolean
              example: true
            created_at:
              type: string
              format: date-time
            pode_editar:
              type: boolean
              readOnly: true
              description: Se o usuário autenticado é o titular deste registro. Presente apenas na listagem.
              example: true

    CartaoCasaVisibilidadeInput:
      type: object
      required: [casa_id]
      properties:
        casa_id:
          type: integer
          example: 1
        compartilhado:
          type: boolean
          default: false
          example: true

    CartaoCasaVisibilidade:
      allOf:
        - $ref: "#/components/schemas/CartaoCasaVisibilidadeInput"
        - type: object
          properties:
            id:
              type: integer
              example: 1
            cartao_id:
              type: integer
              readOnly: true
              example: 2
            created_at:
              type: string
              format: date-time

    CompraInput:
      type: object
      required: [casa_id, pessoa_id, categoria_id, data, competencia, valor_parcela]
      properties:
        casa_id:
          type: integer
          example: 1
        pessoa_id:
          type: integer
          example: 7
        categoria_id:
          type: integer
          example: 3
        descricao:
          type: string
          nullable: true
          example: Conta de energia
        cartao_conta_id:
          type: integer
          nullable: true
          example: 2
        forma_pagamento_id:
          type: integer
          nullable: true
          example: 1
        data:
          type: string
          format: date
          example: "2026-06-15"
        competencia:
          type: string
          description: >
            Mês em que a despesa foi decidida/categorizada (formato MES-AA),
            independente de quando ela efetivamente sai do caixa (ver
            `Parcela.data_caixa`).
          example: JUN-26
        total_parcelas:
          type: integer
          default: 1
          minimum: 1
          example: 3
        valor_parcela:
          type: number
          format: float
          description: Valor de cada parcela (todas as parcelas têm o mesmo valor).
          example: 149.40

    Compra:
      allOf:
        - $ref: "#/components/schemas/CompraInput"
        - type: object
          properties:
            id:
              type: integer
              example: 1
            lancado_por_id:
              type: integer
              nullable: true
              readOnly: true
              description: Definido automaticamente pelo servidor a partir do usuário autenticado na criação; não é alterável.
              example: 7
            pessoa_nome:
              type: string
              nullable: true
              readOnly: true
              example: Erica
            categoria_nome:
              type: string
              nullable: true
              readOnly: true
              example: Roupas
            cartao_conta_nome:
              type: string
              nullable: true
              readOnly: true
              example: Itaú Signature
            pode_editar:
              type: boolean
              readOnly: true
              description: Se o usuário autenticado registrou a compra ou é admin na casa dela.
              example: true
            parcelas:
              type: array
              readOnly: true
              description: Presente apenas nas respostas de criação (POST) e edição (PUT).
              items:
                $ref: "#/components/schemas/Parcela"
            created_at:
              type: string
              format: date-time

    Parcela:
      type: object
      description: Somente leitura — gerada automaticamente pelo servidor a partir da compra.
      properties:
        id:
          type: integer
          example: 1
        compra_id:
          type: integer
          example: 1
        numero_parcela:
          type: integer
          example: 1
        valor:
          type: number
          format: float
          example: 149.40
        fatura_id:
          type: integer
          nullable: true
          description: Preenchido quando a compra usou cartão de crédito.
          example: 9
        data_propria:
          type: string
          format: date
          nullable: true
          description: Preenchido quando a compra não usou cartão de crédito.
          example: "2026-07-15"
        data_caixa:
          type: string
          format: date
          readOnly: true
          description: Data efetiva de saída do valor — vencimento da fatura, quando há, ou data_propria.
          example: "2026-07-25"
        fatura_mes_referencia:
          type: string
          nullable: true
          readOnly: true
          example: JUL-26
        fatura_data_vencimento:
          type: string
          format: date
          nullable: true
          readOnly: true
          example: "2026-07-25"
        created_at:
          type: string
          format: date-time

    CompraPagadorInput:
