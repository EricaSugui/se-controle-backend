  # -------------------------------------------------------------------
  # Convites
  # -------------------------------------------------------------------
  /convites:
    get:
      tags: [Convites]
      summary: Lista convites
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pendente, aceito, expirado]
          example: pendente
        - name: email
          in: query
          required: false
          schema:
            type: string
            format: email
          example: convidado@email.com
      responses:
        "200":
          description: Lista de convites
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Convite"
    post:
      tags: [Convites]
      summary: Cria um convite e envia email pelo Supabase
      description: >
        Salva o convite no banco e aciona o Supabase para enviar um email de convite
        ao endereço informado. O link no email redireciona ao frontend com o token
        do convite na query string e o access_token do Supabase no fragmento (#).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConviteInput"
      responses:
        "201":
          description: Convite criado e email enviado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Convite"
        "400":
          $ref: "#/components/responses/ErroValidacao"

  /convites/token/{token}:
    get:
      tags: [Convites]
      summary: Busca um convite pelo token
      parameters:
        - $ref: "#/components/parameters/ConviteToken"
      responses:
        "200":
          description: Convite encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Convite"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  /convites/token/{token}/aceitar:
    patch:
      tags: [Convites]
      summary: Aceita um convite — fluxo completo de cadastro
      description: >
        Valida o Bearer token do Supabase, confere se o email bate com o do convite,
        cria a pessoa no banco, vincula o supabase_user_id, adiciona à casa_pessoas
        (se o convite tiver casa_id) e marca o convite como aceito. Tudo em uma
        transação atômica.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ConviteToken"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                nome:
                  type: string
                  description: Nome da pessoa. Se omitido, usa o prefixo do email.
                  example: Marcela
      responses:
        "200":
          description: Convite aceito — retorna a pessoa criada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pessoa"
        "401":
          $ref: "#/components/responses/NaoAutenticado"
        "403":
          description: Email do usuário não corresponde ao convite
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"
        "404":
          $ref: "#/components/responses/NaoEncontrado"
        "409":
          description: Convite já utilizado, expirado ou usuário já vinculado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Erro"

  /convites/{id}:
    get:
      tags: [Convites]
      summary: Busca um convite pelo id
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Convite encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Convite"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  /convites/{id}/aceitar:
    patch:
      tags: [Convites]
      summary: Marca um convite como aceito (uso administrativo)
      description: >
        Altera apenas o status do convite para "aceito", sem criar pessoa nem
        acionar Supabase. Use para correções manuais.
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Convite marcado como aceito
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Convite"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  /convites/{id}/expirar:
    patch:
      tags: [Convites]
      summary: Expira um convite pendente
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Convite expirado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Convite"
        "404":
          $ref: "#/components/responses/NaoEncontrado"

  # -------------------------------------------------------------------
  # Dashboard
  # -------------------------------------------------------------------
  /dashboard:
    get:
      tags: [Dashboard]
      summary: Resumo financeiro de uma competência
      description: >
        Retorna o total de receitas, o total de gastos por casa (aplicando o percentual de
        custeio cadastrado para aquela competência) e o saldo do mês.
      parameters:
        - name: competencia
          in: query
          required: true
          description: "Competência no formato MES-AA (ex.: JUN-26)"
          schema:
            type: string
            example: JUN-26
      responses:
        "200":
          description: Resumo do dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dashboard"
        "400":
          $ref: "#/components/responses/ErroValidacao"

  # -------------------------------------------------------------------
  # Fechamento Mensal
  # -------------------------------------------------------------------
  /fechamento-mensal:
    get:
      tags: [Fechamento Mensal]
      summary: Resumo financeiro de várias competências
      description: >
        Retorna um resumo (igual ao do /dashboard) para cada competência no intervalo
        informado, do mês "de" até o mês "ate", inclusive. Máximo de 60 meses.
      parameters:
        - name: de
          in: query
          required: true
          description: "Competência inicial no formato MES-AA (ex.: JAN-26)"
          schema:
            type: string
            example: JAN-26
        - name: ate
          in: query
          required: true
          description: "Competência final no formato MES-AA (ex.: DEZ-26)"
          schema:
            type: string
            example: DEZ-26
      responses:
        "200":
          description: Lista de resumos mensais, um por competência no intervalo
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Dashboard"
        "400":
          $ref: "#/components/responses/ErroValidacao"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT emitido pelo Supabase Auth após login

  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: integer
      example: 1

    CasaId:
      name: casaId
      in: path
      required: true
      schema:
        type: integer
      example: 1

    PessoaId:
      name: pessoaId
      in: path
      required: true
      schema:
        type: integer
      example: 7

    TransacaoId:
      name: transacaoId
      in: path
      required: true
      schema:
        type: integer
      example: 5

    ConviteToken:
      name: token
      in: path
      required: true
      schema:
        type: string
      example: a3f8c2d1e4b7...

    AtivoFiltro:
      name: ativo
      in: query
      required: false
      description: Filtra pelo status ativo/inativo
      schema:
        type: boolean

    CompetenciaFiltro:
      name: competencia
      in: query
      required: false
      description: "Filtra pela competência no formato MES-AA (ex.: JUN-26)"
      schema:
        type: string
        example: JUN-26

  responses:
    ErroValidacao:
      description: Dados inválidos
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Erro"

    NaoEncontrado:
      description: Registro não encontrado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Erro"

    NaoAutenticado:
      description: Token não fornecido ou inválido
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Erro"

    NaoVinculado:
      description: Token válido mas usuário não vinculado a nenhuma pessoa
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Erro"

  schemas:
    Erro:
      type: object
      properties:
        erro:
          type: string
          example: Registro não encontrado

    NomeInput:
      type: object
      required: [nome]
      properties:
        nome:
          type: string
          example: Energia

    PessoaInput:
      type: object
      required: [nome]
      properties:
        nome:
          type: string
          example: Erica
        email:
          type: string
          format: email
          nullable: true
          example: erica@email.com

    Pessoa:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          example: Erica
        email:
          type: string
          format: email
          nullable: true
          example: erica@email.com
        supabase_user_id:
          type: string
          format: uuid
          nullable: true
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        ativo:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time

    Casa:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          example: Minha Casa
        ativo:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time

    CasaPessoaInput:
      type: object
      required: [pessoa_id]
      properties:
        pessoa_id:
          type: integer
          example: 7
        papel:
          type: string
          enum: [admin, membro]
          default: membro
          example: admin

    CasaPessoa:
      type: object
      properties:
        id:
          type: integer
          example: 1
        pessoa_id:
          type: integer
          example: 7
        papel:
          type: string
          enum: [admin, membro]
          example: admin
        created_at:
          type: string
          format: date-time
        nome:
          type: string
          example: Erica
        email:
          type: string
          format: email
          nullable: true
          example: erica@email.com
        ativo:
          type: boolean
          example: true

    Categoria:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          example: Energia
        ativo:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time

    FormaPagamento:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          example: Pix
        ativo:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time

    OrigemReceita:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          example: Salário
        ativo:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time

    CartaoContaInput:
      type: object
      required: [nome, tipo]
      properties:
        nome:
          type: string
          example: Nubank
        tipo:
          type: string
          enum: [credito, debito]
          example: credito
        titular_id:
          type: integer
          nullable: true
          example: 1
        limite:
          type: number
          format: float
          nullable: true
          example: 12000
        dia_fechamento:
          type: integer
          nullable: true
          example: 19
        dia_vencimento:
          type: integer
          nullable: true
          example: 25

    CartaoConta:
      allOf:
        - $ref: "#/components/schemas/CartaoContaInput"
        - type: object
          properties:
            id:
              type: integer
              example: 1
            ativo:
              type: boolean
              example: true
            created_at:
              type: string
              format: date-time

    TransacaoInput:
      type: object
      required: [data, casa_id, pessoa_id, categoria_id, valor_parcela, competencia]
      properties:
        data:
          type: string
          format: date
          example: "2026-06-15"
        casa_id:
          type: integer
          example: 1
        pessoa_id:
          type: integer
          example: 7
        lancado_por_id:
          type: integer
          nullable: true
          example: 7
        categoria_id:
          type: integer
          example: 3
        descricao:
          type: string
          nullable: true
          example: Conta de energia
        cartao_conta_id:
          type: integer
          nullable: true
          example: 2
        forma_pagamento_id:
          type: integer
          nullable: true
          example: 1
        parcela_atual:
          type: integer
          nullable: true
          example: 1
        total_parcelas:
          type: integer
          nullable: true
          example: 9
        valor_parcela:
          type: number
          format: float
          example: 149.40
        competencia:
          type: string
          example: JUN-26

    Transacao:
      allOf:
        - $ref: "#/components/schemas/TransacaoInput"
        - type: object
          properties:
            id:
              type: integer
              example: 1
            created_at:
              type: string
              format: date-time

    TransacaoPagadorInput:
      type: object
      required: [pessoa_id]
      properties:
        pessoa_id:
          type: integer
          example: 7
        percentual:
          type: number
          format: float
          nullable: true
          example: 60

    TransacaoPagador:
      type: object
      properties:
        id:
          type: integer
          example: 1
        pessoa_id:
          type: integer
          example: 7
        percentual:
          type: number
          format: float
          nullable: true
          example: 60
        created_at:
          type: string
          format: date-time
        nome:
          type: string
          example: Erica

    ReceitaInput:
      type: object
      required: [casa_id, valor_liquido]
      properties:
        casa_id:
          type: integer
          example: 1
        pessoa_id:
          type: integer
          nullable: true
          example: 7
        lancado_por_id:
          type: integer
          nullable: true
          example: 7
        origem_id:
          type: integer
          nullable: true
          example: 1
        observacao:
          type: string
          nullable: true
          example: Salário referente a maio
        valor_bruto:
          type: number
          format: float
          nullable: true
          example: 5500
        descontos:
          type: number
          format: float
          nullable: true
          example: 500
        valor_liquido:
          type: number
          format: float
          example: 5000
        data:
          type: string
          format: date
          nullable: true
          example: "2026-06-05"
        competencia:
          type: string
          nullable: true
          example: JUN-26

    Receita:
      allOf:
        - $ref: "#/components/schemas/ReceitaInput"
        - type: object
          properties:
            id:
              type: integer
              example: 1
            created_at:
              type: string
              format: date-time

    MetaInput:
      type: object
      required: [objetivo]
      properties:
        objetivo:
          type: string
          example: Entrada Apartamento
        valor_atual:
          type: number
          format: float
          example: 0
        meta:
          type: number
          format: float
          nullable: true
          example: 50000
        falta:
          type: number
          format: float
          nullable: true
          example: 50000

    Meta:
      allOf:
        - $ref: "#/components/schemas/MetaInput"
        - type: object
          properties:
            id:
              type: integer
              example: 1
            created_at:
              type: string
              format: date-time

    PercentualCusteioInput:
      type: object
      required: [pessoa_id, competencia, percentual]
      properties:
        pessoa_id:
          type: integer
          example: 7
        competencia:
          type: string
          example: JUN-26
        percentual:
          type: number
          format: float
          example: 30

    PercentualCusteio:
      type: object
      properties:
        id:
          type: integer
          example: 1
        casa_id:
          type: integer
          example: 2
        pessoa_id:
          type: integer
          example: 7
        competencia:
          type: string
          example: JUN-26
        percentual:
          type: number
          format: float
          example: 30
        created_at:
          type: string
          format: date-time

    ConviteInput:
      type: object
      required: [email, convidado_por_id]
      properties:
        email:
          type: string
          format: email
          example: convidado@email.com
        convidado_por_id:
          type: integer
          example: 7
        casa_id:
          type: integer
          nullable: true
          example: 1
        papel:
          type: string
          enum: [admin, membro]
          nullable: true
          example: membro
        expires_at:
          type: string
          format: date-time
          nullable: true
          example: "2026-07-25T23:59:59Z"

    Convite:
      type: object
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          format: email
          example: convidado@email.com
        convidado_por_id:
          type: integer
          example: 7
        casa_id:
          type: integer
          nullable: true
          example: 1
        papel:
          type: string
          enum: [admin, membro]
          nullable: true
          example: membro
        token:
          type: string
          example: a3f8c2d1e4b7...
