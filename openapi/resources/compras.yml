paths:
  compras:
    get:
      tags: [Compras]
      summary: Lista compras
      description: >
        Retorna apenas compras de casas das quais o usuário autenticado é
        membro. Cada item inclui `pode_editar`, verdadeiro se o usuário
        autenticado registrou a compra (`lancado_por_id`) ou é admin na casa
        dela.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "../components/parameters.yml#/parameters/CompetenciaFiltro"
        - $ref: "../components/parameters.yml#/parameters/DataCaixaDe"
        - $ref: "../components/parameters.yml#/parameters/DataCaixaAte"
        - name: despesa_fixa_id
          in: query
          required: false
          schema:
            type: integer
          description: Filtra as compras vinculadas a uma despesa fixa (histórico de pagamentos do contrato).
      responses:
        "200":
          description: Lista de compras
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/schemas/Compra"
        "401":
          $ref: "../components/responses.yml#/responses/NaoAutenticado"
    post:
      tags: [Compras]
      summary: Cria uma compra
      description: >
        `lancado_por_id` é sempre definido como o usuário autenticado,
        ignorando qualquer valor enviado no corpo. Requer que o usuário seja
        membro da casa informada em `casa_id`. Cria automaticamente
        `total_parcelas` parcelas: se `cartao_conta_id` referenciar um cartão
        de crédito, cada parcela é atribuída a uma fatura (criada sob demanda
        conforme o dia de fechamento/vencimento do cartão); senão, cada
        parcela usa `data_propria` (data da compra + N meses).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/schemas/CompraInput"
      responses:
        "201":
          description: Compra criada, com as parcelas geradas
          content:
            application/json:
              schema:
                $ref: "#/schemas/Compra"
        "400":
          $ref: "../components/responses.yml#/responses/ErroValidacao"
        "401":
          $ref: "../components/responses.yml#/responses/NaoAutenticado"
        "403":
          $ref: "../components/responses.yml#/responses/SemPermissao"

  compras-id:
    get:
      tags: [Compras]
      summary: Busca uma compra pelo id
      description: Requer que o usuário autenticado seja membro da casa da compra.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "../components/parameters.yml#/parameters/Id"
      responses:
        "200":
          description: Compra encontrada
          content:
            application/json:
              schema:
                $ref: "#/schemas/Compra"
        "401":
          $ref: "../components/responses.yml#/responses/NaoAutenticado"
        "404":
          $ref: "../components/responses.yml#/responses/NaoEncontrado"
    put:
      tags: [Compras]
      summary: Atualiza uma compra
      description: >
        Requer que o usuário autenticado tenha registrado a compra
        (`lancado_por_id`) ou seja admin na casa dela. `lancado_por_id` não é
        alterável. Apaga e recria todas as parcelas da compra.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "../components/parameters.yml#/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/schemas/CompraInput"
      responses:
        "200":
          description: Compra atualizada, com as parcelas recriadas
          content:
            application/json:
              schema:
                $ref: "#/schemas/Compra"
        "400":
          $ref: "../components/responses.yml#/responses/ErroValidacao"
        "401":
          $ref: "../components/responses.yml#/responses/NaoAutenticado"
        "403":
          $ref: "../components/responses.yml#/responses/SemPermissao"
        "404":
          $ref: "../components/responses.yml#/responses/NaoEncontrado"
    delete:
      tags: [Compras]
      summary: Remove uma compra
      description: >
        Requer que o usuário autenticado tenha registrado a compra
        (`lancado_por_id`) ou seja admin na casa dela. Remove em cascata as
        parcelas e o split de pagadores.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "../components/parameters.yml#/parameters/Id"
      responses:
        "204":
          description: Compra removida
        "401":
          $ref: "../components/responses.yml#/responses/NaoAutenticado"
        "403":
          $ref: "../components/responses.yml#/responses/SemPermissao"
        "404":
          $ref: "../components/responses.yml#/responses/NaoEncontrado"

  compras-id-parcelas:
    get:
      tags: [Compras]
      summary: Lista as parcelas de uma compra
      description: >
        Somente leitura — parcelas são geradas automaticamente na criação/edição
        da compra. Cada parcela inclui `data_caixa`, a data efetiva em que o
        valor sai do caixa (vencimento da fatura, quando há cartão de crédito
        envolvido, ou `data_propria` caso contrário).
      security:
        - bearerAuth: []
      parameters:
        - $ref: "../components/parameters.yml#/parameters/Id"
      responses:
        "200":
          description: Lista de parcelas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/schemas/Parcela"
        "401":
          $ref: "../components/responses.yml#/responses/NaoAutenticado"
        "404":
          $ref: "../components/responses.yml#/responses/NaoEncontrado"

  compras-compraId-pagadores:
    get:
      tags: [Compra Pagadores]
      summary: Lista pagadores de uma compra
      security:
        - bearerAuth: []
      parameters:
        - $ref: "../components/parameters.yml#/parameters/CompraId"
      responses:
        "200":
          description: Lista de pagadores com nome da pessoa
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/schemas/CompraPagador"
        "401":
          $ref: "../components/responses.yml#/responses/NaoAutenticado"
        "404":
          $ref: "../components/responses.yml#/responses/NaoEncontrado"
    post:
      tags: [Compra Pagadores]
      summary: Adiciona um pagador a uma compra
      security:
        - bearerAuth: []
      parameters:
        - $ref: "../components/parameters.yml#/parameters/CompraId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/schemas/CompraPagadorInput"
      responses:
        "201":
          description: Pagador adicionado
          content:
            application/json:
              schema:
                $ref: "#/schemas/CompraPagador"
        "400":
          $ref: "../components/responses.yml#/responses/ErroValidacao"
        "401":
          $ref: "../components/responses.yml#/responses/NaoAutenticado"
        "404":
          description: Compra ou pessoa não encontrada
          content:
            application/json:
              schema:
                $ref: "../components/common-schemas.yml#/schemas/Erro"
        "409":
          description: Pessoa já registrada como pagadora desta compra
          content:
            application/json:
              schema:
                $ref: "../components/common-schemas.yml#/schemas/Erro"

  compras-compraId-pagadores-pessoaId:
    patch:
      tags: [Compra Pagadores]
      summary: Atualiza o percentual de um pagador
      security:
        - bearerAuth: []
      parameters:
        - $ref: "../components/parameters.yml#/parameters/CompraId"
        - $ref: "../components/parameters.yml#/parameters/PessoaId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                percentual:
                  type: number
                  format: float
                  nullable: true
                  example: 60
      responses:
        "200":
          description: Percentual atualizado
          content:
            application/json:
              schema:
                $ref: "#/schemas/CompraPagador"
        "401":
          $ref: "../components/responses.yml#/responses/NaoAutenticado"
        "404":
          $ref: "../components/responses.yml#/responses/NaoEncontrado"
    delete:
      tags: [Compra Pagadores]
      summary: Remove um pagador de uma compra
      security:
        - bearerAuth: []
      parameters:
        - $ref: "../components/parameters.yml#/parameters/CompraId"
        - $ref: "../components/parameters.yml#/parameters/PessoaId"
      responses:
        "204":
          description: Pagador removido
        "401":
          $ref: "../components/responses.yml#/responses/NaoAutenticado"
        "404":
          $ref: "../components/responses.yml#/responses/NaoEncontrado"

schemas:
  CompraInput:
    type: object
    required: [casa_id, pessoa_id, categoria_id, data, competencia, valor_parcela]
    properties:
      casa_id:
        type: integer
        example: 1
      pessoa_id:
        type: integer
        example: 7
      categoria_id:
        type: integer
        example: 3
      descricao:
        type: string
        nullable: true
        example: Conta de energia
      cartao_conta_id:
        type: integer
        nullable: true
        description: >
          Meio de pagamento da compra. **Herança**: em compra vinculada a
          despesa fixa, campo OMITIDO herda o cartao_conta_padrao_id do
          contrato; null explícito = sem cartão/conta (dinheiro). Se a
          forma_pagamento tem exige_conta (ex. PIX), null após a herança é
          rejeitado com 400.
        example: 2
      forma_pagamento_id:
        type: integer
        nullable: true
        example: 1
      data:
        type: string
        format: date
        example: "2026-06-15"
      competencia:
        type: string
        pattern: "^(JAN|FEV|MAR|ABR|MAI|JUN|JUL|AGO|SET|OUT|NOV|DEZ)-\\d{2}$"
        description: >
          Mês em que a despesa foi decidida/categorizada (formato MMM-AA com
          mês em **português**, maiúsculo: JAN, FEV, MAR, ABR, MAI, JUN, JUL,
          AGO, SET, OUT, NOV, DEZ — atenção às siglas que diferem do inglês),
          independente de quando ela efetivamente sai do caixa (ver
          `Parcela.data_caixa`). Valor fora do formato é rejeitado com 400.
        example: JUN-26
      total_parcelas:
        type: integer
        default: 1
        minimum: 1
        example: 3
      valor_parcela:
        type: number
        format: float
        description: Valor de cada parcela (todas as parcelas têm o mesmo valor).
        example: 149.40
      despesa_fixa_id:
        type: integer
        nullable: true
        description: >
          Vincula esta compra a uma despesa fixa (registro do pagamento de uma
          competência do contrato). A despesa precisa pertencer ao mesmo
          escopo da compra: mesma casa (despesa de casa) ou mesma pessoa da
          compra (despesa pessoal). No PUT, omitir os campos remove o vínculo.
        example: null
      competencia_referencia:
        type: string
        nullable: true
        pattern: "^(JAN|FEV|MAR|ABR|MAI|JUN|JUL|AGO|SET|OUT|NOV|DEZ)-\\d{2}$"
        description: >
          Competência do contrato a que este pagamento se refere (formato
          MMM-AA com mês em português, maiúsculo; fora do formato é rejeitado
          com 400) — pode diferir de `competencia` se pago atrasado. Exige
          `despesa_fixa_id`; se omitida com vínculo presente, assume a
          `competencia` da compra. Precisa estar dentro da vigência da
          despesa; para despesas anuais, deve usar o mês de início da
          vigência (mês-âncora).
        example: null

  Compra:
    allOf:
      - $ref: "#/schemas/CompraInput"
      - type: object
        properties:
          id:
            type: integer
            example: 1
          lancado_por_id:
            type: integer
            nullable: true
            readOnly: true
            description: Definido automaticamente pelo servidor a partir do usuário autenticado na criação; não é alterável.
            example: 7
          pessoa_nome:
            type: string
            nullable: true
            readOnly: true
            example: Erica
          categoria_nome:
            type: string
            nullable: true
            readOnly: true
            example: Roupas
          cartao_conta_nome:
            type: string
            nullable: true
            readOnly: true
            example: Itaú Signature
          pode_editar:
            type: boolean
            readOnly: true
            description: Se o usuário autenticado registrou a compra ou é admin na casa dela.
            example: true
          parcelas:
            type: array
            readOnly: true
            description: Presente apenas nas respostas de criação (POST) e edição (PUT).
            items:
              $ref: "#/schemas/Parcela"
          created_at:
            type: string
            format: date-time

  Parcela:
    type: object
    description: Somente leitura — gerada automaticamente pelo servidor a partir da compra.
    properties:
      id:
        type: integer
        example: 1
      compra_id:
        type: integer
        example: 1
      numero_parcela:
        type: integer
        example: 1
      valor:
        type: number
        format: float
        example: 149.40
      fatura_id:
        type: integer
        nullable: true
        description: Preenchido quando a compra usou cartão de crédito.
        example: 9
      data_propria:
        type: string
        format: date
        nullable: true
        description: Preenchido quando a compra não usou cartão de crédito.
        example: "2026-07-15"
      data_caixa:
        type: string
        format: date
        readOnly: true
        description: Data efetiva de saída do valor — vencimento da fatura, quando há, ou data_propria.
        example: "2026-07-25"
      fatura_mes_referencia:
        type: string
        nullable: true
        readOnly: true
        example: JUL-26
      fatura_data_vencimento:
        type: string
        format: date
        nullable: true
        readOnly: true
        example: "2026-07-25"
      created_at:
        type: string
        format: date-time

  CompraPagadorInput:
    type: object
    required: [pessoa_id]
    properties:
      pessoa_id:
        type: integer
        example: 7
      percentual:
        type: number
        format: float
        nullable: true
        example: 60

  CompraPagador:
    type: object
    properties:
      id:
        type: integer
        example: 1
      pessoa_id:
        type: integer
        example: 7
      percentual:
        type: number
        format: float
        nullable: true
        example: 60
      created_at:
        type: string
        format: date-time
      nome:
        type: string
        example: Erica
