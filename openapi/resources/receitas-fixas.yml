paths:
  receitas-fixas:
    get:
      tags: [Receitas Fixas]
      summary: Lista receitas fixas
      description: >
        Retorna receitas fixas pessoais do usuário autenticado (`pessoa_id`) e
        das casas das quais ele é membro (`casa_id`). "Vigente" é derivado da
        vigência: `vigente_ate` nulo ou maior/igual a hoje (no fuso horário do
        usuário).
      security:
        - bearerAuth: []
      parameters:
        - name: casa_id
          in: query
          required: false
          schema:
            type: integer
          description: Filtra por casa.
        - name: pessoa_id
          in: query
          required: false
          schema:
            type: integer
          description: Filtra por pessoa (escopo pessoal).
        - name: vigente
          in: query
          required: false
          schema:
            type: boolean
          description: >
            true = apenas vigentes (vigente_ate nulo ou >= hoje);
            false = apenas encerradas (vigente_ate < hoje).
      responses:
        "200":
          description: Lista de receitas fixas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/schemas/ReceitaFixa"
        "401":
          $ref: "../components/responses.yml#/responses/NaoAutenticado"
    post:
      tags: [Receitas Fixas]
      summary: Cria uma receita fixa
      description: >
        Exige exatamente um entre `pessoa_id` e `casa_id`. Receita fixa pessoal
        só pode ser criada pelo próprio usuário; receita de casa exige que o
        usuário seja admin da casa. Para versionar (ex.: mudança de salário),
        encerre o registro atual e crie um novo apontando
        `receita_fixa_anterior_id` para ele — a anterior precisa estar
        encerrada e pertencer ao mesmo escopo. Receita pontual/avulsa continua
        indo direto em POST /receitas, sem passar por aqui. `lancado_por_id` é
        sempre o usuário autenticado.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/schemas/ReceitaFixaInput"
      responses:
        "201":
          description: Receita fixa criada
          content:
            application/json:
              schema:
                $ref: "#/schemas/ReceitaFixa"
        "400":
          $ref: "../components/responses.yml#/responses/ErroValidacao"
        "401":
          $ref: "../components/responses.yml#/responses/NaoAutenticado"
        "403":
          $ref: "../components/responses.yml#/responses/SemPermissao"

  receitas-fixas-status:
    get:
      tags: [Receitas Fixas]
      summary: Status das competências esperadas (recebimentos)
      description: >
        Gera as competências esperadas de cada receita fixa visível — da
        vigência até hoje; mensal de 1 em 1 mês, anual de 12 em 12 a partir do
        mês-âncora (mês de `vigente_desde`) — e compara com as receitas
        vinculadas (`receita_fixa_id` + `competencia_referencia`).
        "Hoje" é calculado no fuso horário do usuário (`pessoas.fuso_horario`).
        Sem `competencia`: retorna apenas itens em aberto. Com `competencia`:
        visão de fechamento daquele mês, incluindo itens `recebido`. Itens
        ordenados por severidade (atrasado, aguardando, recebido) e data
        esperada. Vigência encerrada simplesmente para de gerar linhas — não
        há estado "interrompida".
      security:
        - bearerAuth: []
      parameters:
        - name: competencia
          in: query
          required: false
          schema:
            type: string
          description: Competência no formato MES-AA (ex. JUL-26).
          example: JUL-26
        - name: folga_dias
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 3
          description: >
            Dias de tolerância após dia_esperado_recebimento antes de
            classificar como atrasado.
      responses:
        "200":
          description: Itens de status por receita fixa e competência
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/schemas/ReceitaFixaStatusItem"
        "400":
          $ref: "../components/responses.yml#/responses/ErroValidacao"
        "401":
          $ref: "../components/responses.yml#/responses/NaoAutenticado"

  receitas-fixas-id:
    get:
      tags: [Receitas Fixas]
      summary: Busca uma receita fixa pelo id
      description: >
        Requer que a receita fixa seja pessoal do usuário autenticado, ou de
        casa da qual ele é membro.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "../components/parameters.yml#/parameters/Id"
      responses:
        "200":
          description: Receita fixa encontrada
          content:
            application/json:
              schema:
                $ref: "#/schemas/ReceitaFixa"
        "401":
          $ref: "../components/responses.yml#/responses/NaoAutenticado"
        "404":
          $ref: "../components/responses.yml#/responses/NaoEncontrado"
    put:
      tags: [Receitas Fixas]
      summary: Atualiza uma receita fixa
      description: >
        Requer que a receita seja pessoal do usuário autenticado, ou de casa
        da qual ele é admin. `pessoa_id`/`casa_id` (escopo),
        `receita_fixa_anterior_id` e `lancado_por_id` não são alteráveis.
        Para mudança de salário/contrato, a orientação é versionar (encerrar +
        criar nova com `receita_fixa_anterior_id`) em vez de editar o valor.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "../components/parameters.yml#/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/schemas/ReceitaFixaInput"
      responses:
        "200":
          description: Receita fixa atualizada
          content:
            application/json:
              schema:
                $ref: "#/schemas/ReceitaFixa"
        "400":
          $ref: "../components/responses.yml#/responses/ErroValidacao"
        "401":
          $ref: "../components/responses.yml#/responses/NaoAutenticado"
        "403":
          $ref: "../components/responses.yml#/responses/SemPermissao"
        "404":
          $ref: "../components/responses.yml#/responses/NaoEncontrado"

  receitas-fixas-id-encerrar:
    patch:
      tags: [Receitas Fixas]
      summary: Encerra uma receita fixa
      description: >
        Define `vigente_ate` (default hoje, no fuso horário do usuário). É o
        mecanismo para marcar fim de recorrência (ex. demissão) — não há
        DELETE nem campo de status. Falha se já estiver encerrada. Encerrada
        hoje continua vigente até o fim do dia.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "../components/parameters.yml#/parameters/Id"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                vigente_ate:
                  type: string
                  format: date
                  nullable: true
                  description: "Data de fim da vigência. Default: hoje."
                  example: "2026-12-31"
      responses:
        "200":
          description: Receita fixa encerrada
          content:
            application/json:
              schema:
                $ref: "#/schemas/ReceitaFixa"
        "400":
          $ref: "../components/responses.yml#/responses/ErroValidacao"
        "401":
          $ref: "../components/responses.yml#/responses/NaoAutenticado"
        "403":
          $ref: "../components/responses.yml#/responses/SemPermissao"
        "404":
          $ref: "../components/responses.yml#/responses/NaoEncontrado"

  receitas-fixas-id-excecoes:
    get:
      tags: [Receitas Fixas]
      summary: Lista exceções de uma receita fixa
      description: >
        Exceção = desvio pontual de uma competência do contrato vigente, sem
        versionar. Caso principal: justificar uma competência que não terá
        recebimento (ex. cliente cancelou o mês, bônus não pago) — ela vira
        status `justificado`. Caso secundário: anotar desvio de valor de uma
        ocorrência recebida (auditoria). Visível para quem lê o contrato.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "../components/parameters.yml#/parameters/Id"
      responses:
        "200":
          description: Lista de exceções
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/schemas/ReceitaFixaExcecao"
        "401":
          $ref: "../components/responses.yml#/responses/NaoAutenticado"
        "404":
          $ref: "../components/responses.yml#/responses/NaoEncontrado"
    post:
      tags: [Receitas Fixas]
      summary: Registra uma exceção em uma competência
      description: >
        Requer permissão de escrita no contrato (admin da casa ou dono). A
        competência precisa estar na vigência (mês-âncora para anuais). Uma
        exceção por competência (409 em duplicata). `valor_esperado_original`
        é snapshot do valor_esperado do contrato no momento (pode ser nulo em
        contratos de confiabilidade variável), preenchido pelo servidor.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "../components/parameters.yml#/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/schemas/ReceitaFixaExcecaoInput"
      responses:
        "201":
          description: Exceção registrada
          content:
            application/json:
              schema:
                $ref: "#/schemas/ReceitaFixaExcecao"
        "400":
          $ref: "../components/responses.yml#/responses/ErroValidacao"
        "401":
          $ref: "../components/responses.yml#/responses/NaoAutenticado"
        "403":
          $ref: "../components/responses.yml#/responses/SemPermissao"
        "404":
          $ref: "../components/responses.yml#/responses/NaoEncontrado"
        "409":
          description: Já existe uma exceção para essa competência
          content:
            application/json:
              schema:
                $ref: "../components/common-schemas.yml#/schemas/Erro"

  receitas-fixas-id-excecoes-excecaoId:
    delete:
      tags: [Receitas Fixas]
      summary: Remove uma exceção
      description: >
        Exceção é anotação corrigível, não histórico financeiro — por isso tem
        DELETE físico (diferente dos contratos). Remover a exceção de uma
        competência sem recebimento reabre o atraso no status.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "../components/parameters.yml#/parameters/Id"
        - name: excecaoId
          in: path
          required: true
          schema:
            type: integer
          description: Id da exceção.
      responses:
        "204":
          description: Exceção removida
        "401":
          $ref: "../components/responses.yml#/responses/NaoAutenticado"
        "403":
          $ref: "../components/responses.yml#/responses/SemPermissao"
        "404":
          $ref: "../components/responses.yml#/responses/NaoEncontrado"

schemas:
  ReceitaFixaExcecaoInput:
    type: object
    required: [competencia_referencia]
    properties:
      competencia_referencia:
        type: string
        pattern: "^(JAN|FEV|MAR|ABR|MAI|JUN|JUL|AGO|SET|OUT|NOV|DEZ)-\\d{2}$"
        description: Competência do contrato excepcionada (MMM-AA em português, dentro da vigência).
        example: JUN-26
      valor_ocorrido:
        type: number
        format: float
        nullable: true
        description: >
          Valor real da ocorrência, quando houve recebimento fora do padrão.
          Nulo quando a competência não terá recebimento.
        example: null
      motivo:
        type: string
        nullable: true
        maxLength: 255
        description: Texto livre explicando a exceção.
        example: cliente cancelou o mês

  ReceitaFixaExcecao:
    allOf:
      - $ref: "#/schemas/ReceitaFixaExcecaoInput"
      - type: object
        properties:
          id:
            type: integer
            example: 1
          receita_fixa_id:
            type: integer
            readOnly: true
            example: 1
          valor_esperado_original:
            type: number
            format: float
            nullable: true
            readOnly: true
            description: Snapshot do valor_esperado do contrato no momento do registro (pode ser nulo); preenchido pelo servidor.
            example: 5000
          lancado_por_id:
            type: integer
            nullable: true
            readOnly: true
            example: 7
          created_at:
            type: string
            format: date-time

  ReceitaFixaInput:
    type: object
    required: [origem_id, descricao, tipo_confiabilidade, periodicidade, dia_esperado_recebimento, vigente_desde]
    description: >
      pessoa_id e casa_id são mutuamente exclusivos — informe exatamente um
      dos dois na criação (não são alteráveis depois). Receita pessoal
      (pessoa_id) só pode ser criada para o próprio usuário autenticado;
      receita de casa (casa_id) exige que o usuário seja admin daquela casa.
    properties:
      casa_id:
        type: integer
        nullable: true
        description: Preencher para receita da casa. Mutuamente exclusivo com pessoa_id.
        example: 1
      pessoa_id:
        type: integer
        nullable: true
        description: Preencher para receita pessoal. Mutuamente exclusivo com casa_id.
        example: null
      origem_id:
        type: integer
        description: FK para o catálogo origens_receita (salário, rendimentos, etc.).
        example: 1
      descricao:
        type: string
        description: Nome específico da instância do contrato.
        example: Salário CLT - Empresa X
      tipo_confiabilidade:
        type: string
        enum: [fixa, variavel]
        description: >
          fixa = valor contratual confiável (CLT, pensão); variavel = receita
          recorrente de valor incerto (freelance recorrente).
        example: fixa
      valor_esperado:
        type: number
        format: float
        nullable: true
        description: >
          Valor esperado por competência. Pode ser nulo para receitas de
          confiabilidade variável sem estimativa.
        example: 5000
      periodicidade:
        type: string
        enum: [mensal, anual]
        description: Anual cobre casos como 13º (âncora no mês de vigente_desde).
        example: mensal
      dia_esperado_recebimento:
        type: integer
        minimum: 1
        maximum: 31
        description: >
          Dia do mês esperado para o recebimento. Em meses mais curtos, é
          clampado ao último dia (31 vira 28/29 em fevereiro).
        example: 5
      vigente_desde:
        type: string
        format: date
        example: "2026-01-01"
      vigente_ate:
        type: string
        format: date
        nullable: true
        description: >
          Nulo = ainda vigente. Fechar vigente_ate é o mecanismo de fim de
          recorrência (ex. demissão).
        example: null
      receita_fixa_anterior_id:
        type: integer
        nullable: true
        description: >
          Versão anterior deste contrato (versionamento por sucessão, ex.
          mudança de salário). A anterior precisa estar encerrada e pertencer
          ao mesmo escopo. Não é alterável após a criação.
        example: null
      conta_destino_id:
        type: integer
        nullable: true
        description: >
          Conta destino padrão do contrato (débito/aplicação). Herdada pelas
          receitas vinculadas quando o campo vem omitido no lançamento, e
          usada pela projeção de saldo para as ocorrências esperadas —
          contrato sem conta destino fica fora da projeção (aparece nos
          avisos).
        example: 3

  ReceitaFixa:
    allOf:
      - $ref: "#/schemas/ReceitaFixaInput"
      - type: object
        properties:
          id:
            type: integer
            example: 1
          lancado_por_id:
            type: integer
            nullable: true
            readOnly: true
            description: Definido automaticamente pelo servidor a partir do usuário autenticado na criação; não é alterável.
            example: 7
          origem_nome:
            type: string
            readOnly: true
            description: Presente nas respostas de listagem e busca (GET).
            example: Salário
          created_at:
            type: string
            format: date-time

  ReceitaFixaStatusItem:
    type: object
    description: >
      Uma competência esperada de uma receita fixa, com sua situação frente
      às receitas vinculadas.
    properties:
      receita_fixa_id:
        type: integer
        example: 1
      descricao:
        type: string
        example: Salário CLT - Empresa X
      casa_id:
        type: integer
        nullable: true
        example: 1
      pessoa_id:
        type: integer
        nullable: true
        example: null
      origem_id:
        type: integer
        example: 1
      origem_nome:
        type: string
        example: Salário
      tipo_confiabilidade:
        type: string
        enum: [fixa, variavel]
        example: fixa
      valor_esperado:
        type: number
        format: float
        nullable: true
        example: 5000
      periodicidade:
        type: string
        enum: [mensal, anual]
        example: mensal
      competencia:
        type: string
        description: Competência esperada, formato MES-AA.
        example: JUL-26
      data_esperada:
        type: string
        format: date
        description: dia_esperado_recebimento aplicado à competência (clampado ao último dia do mês).
        example: "2026-07-05"
      status:
        type: string
        enum: [recebido, aguardando, atrasado, justificado]
        description: >
          recebido = existe receita vinculada à competência; aguardando =
          ainda dentro da data esperada + folga; atrasado = passou da folga
          sem recebimento; justificado = sem recebimento, mas com exceção
          registrada — sai da lista "em aberto" e aparece na visão por
          competência. Se há recebimento, ele vence: a exceção vira só
          anotação e o status é recebido.
        example: atrasado
